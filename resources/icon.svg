<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1018"/>
      <stop offset="55%" style="stop-color:#152238"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#00c8e8"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- App icon safe zone: 448px inner area, 32px margin typical -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" stroke="rgba(0,229,255,0.35)" stroke-width="4"/>
  <!-- Motion chevrons -->
