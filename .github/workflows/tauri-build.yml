# Cross-platform Tauri release builds — one workflow artifact per OS.
name: Tauri build

on:
  workflow_dispatch:
  #push:
  #  branches: [main]
  #  paths:
  #    - "web/**"
  #    - "src-tauri/**"
  #    - ".github/workflows/tauri-build.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux-x64
          - platform: macos-latest
            label: macos
          - platform: windows-latest
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-${{ matrix.label }}

      # No package.json / @tauri-apps/cli in-repo; tauri-action needs a CLI (see tauriScript below).
      - name: Install Tauri CLI (Cargo)
        run: cargo install tauri-cli --version 2.10.1 --locked

      - name: Build release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
        with:
          projectPath: src-tauri
          tauriScript: cargo tauri

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ane-racing-pro-${{ matrix.label }}
          path: src-tauri/target/release/ane-racing-pro.exe
          if-no-files-found: error

      - name: Upload (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ane-racing-pro-${{ matrix.label }}
          path: src-tauri/target/release/ane-racing-pro
          if-no-files-found: error

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ane-racing-pro-${{ matrix.label }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
